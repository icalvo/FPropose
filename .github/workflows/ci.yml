name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore FPropose.sln

      - name: Build
        run: dotnet build FPropose.sln -c Release --no-restore

      - name: Test
        run: dotnet test FPropose.sln -c Release --no-build --verbosity normal
